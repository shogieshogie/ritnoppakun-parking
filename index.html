<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <!-- opt out of mobile browser force-dark color inversion: page is already dark by design -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <meta name="supported-color-schemes" content="dark" />
    <title>ritnoppakun.com — prototype</title>
    <style>
      :root { color-scheme: dark; }

      @font-face {
        font-family: 'Anime Ace';
        src: url('./fonts/animeace2_reg.ttf') format('truetype');
        font-display: swap;
      }

      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #000;
        overflow: hidden;
        cursor: crosshair;
        /* belt-and-suspenders: explicitly ask Chromium not to invert anything */
        forced-color-adjust: none;
      }
      body {
        display: flex; align-items: center; justify-content: center;
      }

      .scene {
        width: min(85vw, 720px);
        aspect-ratio: 25 / 14;
        position: relative;
        transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
        transform-origin: center center;
      }
      .scene svg { width: 100%; height: 100%; display: block; }
      .tummy-hit { cursor: pointer; }

      .breathe {
        transform-origin: 250px 180px;
        animation: breathe 4s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1); }
        50%      { transform: scale(1.015, 1.025); }
      }

      .paw {
        transform-origin: var(--paw-origin, 250px 180px);
        animation: paw-twitch 6s ease-in-out infinite;
      }
      .paw.p2 { animation-delay: 1.5s; }
      .paw.p3 { animation-delay: 3s; }
      .paw.p4 { animation-delay: 4.5s; }
      @keyframes paw-twitch {
        0%, 92%, 100% { transform: rotate(0); }
        96%           { transform: rotate(-4deg); }
      }

      .tail {
        transform-origin: 350px 200px;
        animation: tail-wag 5s ease-in-out infinite;
      }
      @keyframes tail-wag {
        0%, 100% { transform: rotate(0); }
        50%      { transform: rotate(6deg); }
      }

      .scene.angry {
        transform: scale(1.7) translateY(-10px);
        transition: transform 140ms cubic-bezier(0.2, 0.6, 0.4, 2);
      }
      .scene.angry .breathe,
      .scene.angry .paw { animation-play-state: paused; }
      .scene.angry .tail { animation: tail-poof 0.4s ease-out; }
      @keyframes tail-poof {
        from { transform: rotate(0) scale(1); }
        to   { transform: rotate(35deg) scale(1.15); }
      }

      .calm-face { opacity: 1; transition: opacity 120ms ease; }
      .angry-face { opacity: 0; transition: opacity 120ms ease; }
      .scene.angry .calm-face { opacity: 0; }
      .scene.angry .angry-face { opacity: 1; }

      .scratch {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 10; opacity: 0;
      }
      .scratch svg { width: 100%; height: 100%; display: block; }
      .scratch-line {
        stroke: #fff; stroke-width: 14; stroke-linecap: round; fill: none;
        stroke-dasharray: 1400; stroke-dashoffset: 1400;
        filter: drop-shadow(0 0 12px rgba(255, 60, 60, 0.85))
                drop-shadow(0 0 4px rgba(255, 0, 0, 1));
      }
      .scratch.flash { animation: scratch-flash 700ms ease-out forwards; }
      .scratch.flash .scratch-line { animation: scratch-draw 320ms cubic-bezier(0.3, 0, 0.2, 1) forwards; }
      .scratch.flash .scratch-line.s2 { animation-delay: 60ms; }
      .scratch.flash .scratch-line.s3 { animation-delay: 120ms; }
      @keyframes scratch-flash {
        0% { opacity: 0; } 15% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; }
      }
      @keyframes scratch-draw { to { stroke-dashoffset: 0; } }

      .hint {
        position: absolute;
        left: 50%; top: 70%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.18);
        font-family: 'Anime Ace', 'Comic Sans MS', cursive;
        font-size: 14px;
        pointer-events: none;
        animation: hint-pulse 6s ease-in-out infinite;
      }
      @keyframes hint-pulse {
        0%, 80%, 100% { opacity: 0; }
        40%, 60%      { opacity: 1; }
      }

      /* periodic yawn: ~10s cycle, ~1s yawn window */
      .awake { animation: awake-cycle 10s ease-in-out infinite; }
      .yawn  { opacity: 0; animation: yawn-cycle 10s ease-in-out infinite; transform-origin: 100px 142px; }
      @keyframes awake-cycle {
        0%, 80%, 100% { opacity: 1; }
        86%, 94%      { opacity: 0; }
      }
      @keyframes yawn-cycle {
        0%, 80%, 100% { opacity: 0; transform: scaleY(0.6); }
        86%, 94%      { opacity: 1; transform: scaleY(1); }
      }
      .scene.angry .awake,
      .scene.angry .yawn { animation-play-state: paused; }

      @media (prefers-reduced-motion: reduce) {
        .breathe, .paw, .tail, .hint, .awake, .yawn { animation: none; }
        .yawn { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <main class="scene" id="scene" aria-label="An orange tabby cat lying on her side">
      <svg viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">

        <!-- TAIL (starts inside body so it stays connected through wag/breathe) -->
        <g class="tail">
          <path
            d="M 350 200
               Q 420 215, 442 250
               Q 442 272, 422 272"
            fill="none"
            stroke="#e89a4a"
            stroke-width="20"
            stroke-linecap="round" />
          <!-- tail stripes (solid color, no opacity for consistent mobile rendering) -->
          <path d="M 410 218 q 4 6 4 13"  stroke="#b86528" stroke-width="3" fill="none" stroke-linecap="round" />
          <path d="M 435 240 q -2 6 -8 8" stroke="#b86528" stroke-width="3" fill="none" stroke-linecap="round" />
          <!-- white tail tip -->
          <circle cx="422" cy="272" r="10" fill="#fff5e6" />
        </g>

        <g class="breathe">

          <!-- MAIN BODY: slimmer horizontal oval -->
          <path
            d="M 122 142
               Q 118 105, 158 100
               Q 228 92, 298 102
               Q 358 110, 376 152
               Q 384 198, 342 212
               Q 240 224, 162 215
               Q 118 209, 122 142 Z"
            fill="#e89a4a" />

          <!-- TUMMY (cream, exposed) -->
          <path
            d="M 158 158
               Q 225 168, 295 158
               Q 346 165, 354 196
               Q 318 215, 240 215
               Q 170 215, 156 198
               Q 146 180, 158 158 Z"
            fill="#f4d4a4" />

          <!-- back/side stripes (solid color, no opacity for stable mobile rendering) -->
          <g stroke="#a85c20" stroke-width="4" fill="none" stroke-linecap="round">
            <path d="M 156 110 q 2 12 -2 22" />
            <path d="M 188 104 q 2 14 -2 24" />
            <path d="M 220 100 q 0 16 0 26" />
            <path d="M 252 102 q 0 16 2 26" />
            <path d="M 284 106 q 2 14 4 24" />
            <path d="M 316 114 q 4 14 6 22" />
            <path d="M 348 130 q 6 10 6 20" />
          </g>

          <!-- chest fluff line -->
          <path d="M 240 162 Q 245 192, 240 215" stroke="#dcb98c" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7" />

          <!-- BACK LEG (right) bent up, knee high -->
          <g class="paw p1" style="--paw-origin: 345px 175px;">
            <path
              d="M 345 175
                 Q 380 145, 360 110"
              fill="none"
              stroke="#e89a4a"
              stroke-width="30"
              stroke-linecap="round" />
            <path d="M 376 142 q -8 4 -10 12" stroke="#9b4f1a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7" />
            <ellipse cx="358" cy="103" rx="16" ry="11" fill="#e89a4a" transform="rotate(-25 358 103)" />
            <ellipse cx="352" cy="98"  rx="10" ry="6"  fill="#f4d4a4" transform="rotate(-25 352 98)" />
            <!-- pink paw pads -->
            <circle cx="346" cy="96" r="2" fill="#e8a4a0" />
            <circle cx="352" cy="94" r="2" fill="#e8a4a0" />
            <circle cx="358" cy="96" r="2" fill="#e8a4a0" />
          </g>

          <!-- BACK LEG (left, tucked low) -->
          <g class="paw p2" style="--paw-origin: 320px 220px;">
            <ellipse cx="320" cy="225" rx="26" ry="13" fill="#e89a4a" />
            <ellipse cx="338" cy="226" rx="10" ry="6"  fill="#f4d4a4" />
            <circle cx="332" cy="226" r="1.8" fill="#e8a4a0" />
            <circle cx="338" cy="223" r="1.8" fill="#e8a4a0" />
            <circle cx="344" cy="226" r="1.8" fill="#e8a4a0" />
          </g>

          <!-- FRONT PAWS bent toward chin -->
          <g class="paw p3" style="--paw-origin: 145px 160px;">
            <path
              d="M 150 160
                 Q 120 180, 110 215"
              fill="none"
              stroke="#e89a4a"
              stroke-width="20"
              stroke-linecap="round" />
            <ellipse cx="108" cy="220" rx="14" ry="10" fill="#f4d4a4" transform="rotate(-25 108 220)" />
            <circle cx="101" cy="220" r="2" fill="#e8a4a0" />
            <circle cx="108" cy="217" r="2" fill="#e8a4a0" />
            <circle cx="115" cy="220" r="2" fill="#e8a4a0" />
          </g>
          <g class="paw p4" style="--paw-origin: 165px 165px;">
            <path
              d="M 168 165
                 Q 145 195, 138 225"
              fill="none"
              stroke="#e89a4a"
              stroke-width="18"
              stroke-linecap="round" />
            <ellipse cx="135" cy="230" rx="13" ry="9" fill="#f4d4a4" transform="rotate(-25 135 230)" />
            <circle cx="129" cy="230" r="2" fill="#e8a4a0" />
            <circle cx="135" cy="227" r="2" fill="#e8a4a0" />
            <circle cx="141" cy="230" r="2" fill="#e8a4a0" />
          </g>

          <!-- HEAD on the left -->
          <g>
            <!-- ears (smaller, base tucked into head circle so they stay attached) -->
            <path d="M 60 92 L 68 50 L 92 78 Z"     fill="#e89a4a" />
            <path d="M 140 92 L 132 50 L 108 78 Z"  fill="#e89a4a" />
            <path d="M 70 84 L 73 60 L 87 76 Z"     fill="#e8a4a0" />
            <path d="M 130 84 L 127 60 L 113 76 Z"  fill="#e8a4a0" />

            <circle cx="100" cy="118" r="48" fill="#e89a4a" />

            <!-- forehead tabby M (solid color) -->
            <g fill="none" stroke="#a85c20" stroke-width="2.8" stroke-linecap="round">
              <path d="M 78 92  q 4 8 0 16" />
              <path d="M 100 88 q 0 10 0 18" />
              <path d="M 122 92 q -4 8 0 16" />
            </g>
            <!-- side cheek stripes (solid color) -->
            <g fill="none" stroke="#b8682a" stroke-width="2.5" stroke-linecap="round">
              <path d="M 65 112 q 8 0 14 -4" />
              <path d="M 60 126 q 10 -2 16 -4" />
              <path d="M 135 112 q -8 0 -14 -4" />
              <path d="M 140 126 q -10 -2 -16 -4" />
            </g>

            <!-- chin/cheek cream -->
            <ellipse cx="100" cy="140" rx="32" ry="17" fill="#f4d4a4" />

            <!-- CALM FACE (alert pounce eyes + periodic yawn) -->
            <g class="calm-face">
              <!-- always-visible pink nose -->
              <path d="M 100 134 l -5 6 l 10 0 Z" fill="#d68a8a" />

              <!-- AWAKE: wide round eyes + reverted two-curve mouth -->
              <g class="awake">
                <circle cx="84"  cy="118" r="10" fill="#b9d27a" />
                <circle cx="116" cy="118" r="10" fill="#b9d27a" />
                <circle cx="84"  cy="118" r="10" fill="none" stroke="#3a2010" stroke-width="2" />
                <circle cx="116" cy="118" r="10" fill="none" stroke="#3a2010" stroke-width="2" />
                <ellipse class="pupil" data-eye-cx="84"  data-eye-cy="118" cx="84"  cy="118" rx="6.5" ry="7" fill="#1a1a1a" />
                <ellipse class="pupil" data-eye-cx="116" data-eye-cy="118" cx="116" cy="118" rx="6.5" ry="7" fill="#1a1a1a" />
                <!-- catchlights offset to upper-left so the dark pupil is clearly visible at center -->
                <circle cx="81"  cy="115" r="2" fill="#fff" pointer-events="none" />
                <circle cx="113" cy="115" r="2" fill="#fff" pointer-events="none" />
                <!-- reverted mouth (two soft curves) -->
                <path d="M 100 141 q -5 4 -9 3" stroke="#3a2010" stroke-width="1.4" fill="none" stroke-linecap="round" />
                <path d="M 100 141 q  5 4  9 3" stroke="#3a2010" stroke-width="1.4" fill="none" stroke-linecap="round" />
              </g>

              <!-- YAWN: squinted closed eyes + big open mouth + tongue -->
              <g class="yawn">
                <!-- squinted-shut eyes (gentle upward curves) -->
                <path d="M 74 120 q 10 -7 20 0"  stroke="#3a2010" stroke-width="1.8" fill="none" stroke-linecap="round" />
                <path d="M 106 120 q 10 -7 20 0" stroke="#3a2010" stroke-width="1.8" fill="none" stroke-linecap="round" />
                <!-- open mouth -->
                <ellipse cx="100" cy="150" rx="9" ry="11" fill="#1a1a1a" />
                <!-- tongue -->
                <ellipse cx="100" cy="155" rx="5" ry="5"  fill="#e08a8a" />
                <!-- tiny upper teeth hint -->
                <path d="M 94 142 l 1 4 l 2 -4 Z"  fill="#fff" />
                <path d="M 103 142 l 1 4 l 2 -4 Z" fill="#fff" />
              </g>
            </g>

            <!-- ANGRY FACE -->
            <g class="angry-face">
              <!-- red flush behind eyes -->
              <ellipse cx="84"  cy="122" rx="13" ry="5" fill="#ff3a1f" opacity="0.45" />
              <ellipse cx="116" cy="122" rx="13" ry="5" fill="#ff3a1f" opacity="0.45" />
              <!-- furrowed brows: V pointing down toward nose -->
              <path d="M 66 102 L 96 116" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round" />
              <path d="M 134 102 L 104 116" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round" />
              <!-- closed angry eyes: >_< inward-pointing chevrons -->
              <path d="M 72 114 L 94 122 L 72 130" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round" />
              <path d="M 128 114 L 106 122 L 128 130" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round" />
              <!-- nose -->
              <path d="M 100 134 l -5 6 l 10 0 Z" fill="#d68a8a" />
              <!-- snarling open mouth + fangs -->
              <path d="M 84 148 Q 100 166, 116 148 Q 100 156, 84 148 Z" fill="#1a1a1a" />
              <path d="M 90 150 l 1.5 8 l 3 -8 Z" fill="#fff" />
              <path d="M 106 150 l 1.5 8 l 3 -8 Z" fill="#fff" />
            </g>

            <!-- whiskers -->
            <line x1="60" y1="130" x2="28" y2="128" stroke="#b09060" stroke-width="0.9" />
            <line x1="60" y1="136" x2="28" y2="140" stroke="#b09060" stroke-width="0.9" />
            <line x1="140" y1="130" x2="172" y2="128" stroke="#b09060" stroke-width="0.9" />
            <line x1="140" y1="136" x2="172" y2="140" stroke="#b09060" stroke-width="0.9" />
          </g>

          <!-- TUMMY HIT TARGET (explicit fill + pointer-events for reliable mobile hit testing) -->
          <ellipse class="tummy-hit" cx="245" cy="185" rx="105" ry="40" fill="#000" fill-opacity="0" pointer-events="all" />
        </g>
      </svg>

      <div class="hint">click my tummy ✨</div>
    </main>

    <div class="scratch" id="scratch" aria-hidden="true">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <path class="scratch-line s1" d="M -5 110 L 70 -10" />
        <path class="scratch-line s2" d="M 10 115 L 85 -5"  />
        <path class="scratch-line s3" d="M 25 110 L 100 0"  />
      </svg>
    </div>

    <script>
      const scene = document.getElementById('scene');
      const scratch = document.getElementById('scratch');
      const tummy = document.querySelector('.tummy-hit');
      const pupils = document.querySelectorAll('.pupil');
      const svg = scene.querySelector('svg');

      function svgPoint(x, y) {
        const pt = svg.createSVGPoint();
        pt.x = x; pt.y = y;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
      }
      const MAX = 2.5;
      function trackTo(clientX, clientY) {
        const p = svgPoint(clientX, clientY);
        pupils.forEach((pupil) => {
          const ex = parseFloat(pupil.dataset.eyeCx);
          const ey = parseFloat(pupil.dataset.eyeCy);
          const dx = p.x - ex;
          const dy = p.y - ey;
          const d = Math.hypot(dx, dy);
          if (d === 0) return;
          const k = Math.min(MAX, d / 30) / d;
          pupil.setAttribute('cx', ex + dx * k);
          pupil.setAttribute('cy', ey + dy * k);
        });
      }
      window.addEventListener('mousemove', (e) => trackTo(e.clientX, e.clientY));
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length) trackTo(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      let busy = false;
      tummy.addEventListener('click', () => {
        if (busy) return;
        busy = true;
        scene.classList.add('angry');
        setTimeout(() => scratch.classList.add('flash'), 120);
        setTimeout(() => scene.classList.remove('angry'), 800);
        setTimeout(() => {
          scratch.classList.remove('flash');
          busy = false;
        }, 1400);
      });
    </script>
  </body>
</html>
